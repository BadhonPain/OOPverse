<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOPverse - Professional Interactive IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header-top">
            <div class="logo-section">
                <svg width="40" height="40" viewBox="0 0 40 40" style="margin-right: 8px;">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle cx="20" cy="20" r="19" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3"/>
                    <circle cx="20" cy="10" r="4" fill="url(#logoGradient)"/>
                    <circle cx="20" cy="10" r="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                    <circle cx="12" cy="26" r="4" fill="url(#logoGradient)"/>
                    <circle cx="12" cy="26" r="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                    <circle cx="28" cy="26" r="4" fill="url(#logoGradient)"/>
                    <circle cx="28" cy="26" r="3" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
                    <line x1="20" y1="14" x2="12" y2="22" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
                    <line x1="20" y1="14" x2="28" y2="22" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
                    <line x1="12" y1="26" x2="28" y2="26" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
                </svg>
                OOPverse
            </div>
            <div class="top-controls">
                <div class="stats-bar">
                    <div class="stat"><i class="fas fa-file"></i> <span id="statFile">-</span></div>
                    <div class="stat"><i class="fas fa-clock"></i> <span id="statTime">-</span></div>
                    <div class="stat"><i class="fas fa-code"></i> <span id="statLang">-</span></div>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙 Dark</button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="section-header"><i class="fas fa-code"></i> Language</div>
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="cpp">C++</button>
                    <button class="lang-btn" data-lang="java">Java</button>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-header"><i class="fas fa-cube"></i> Modules</div>
                <div class="search-box">
                    <input type="text" id="moduleSearch" placeholder="Search modules...">
                </div>
                <div id="modulesList"></div>
            </div>

            <div class="sidebar-section">
                <div class="section-header"><i class="fas fa-file-code"></i> Files</div>
                <div class="search-box">
                    <input type="text" id="fileSearch" placeholder="Search files...">
                </div>
                <div id="filesList"></div>
                <div class="recent-files" style="display:none;" id="recentSection">
                    <strong>📌 Recent:</strong>
                    <div id="recentFiles"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Code Preview -->
            <div class="editor-area">
                <div class="code-preview">
                    <div class="panel-header">
                        <div class="panel-title">
                            <i class="fas fa-file-code"></i> <span id="codeFileName">Select a file</span>
                        </div>
                        <div class="panel-actions">
                            <button class="icon-btn" id="copyCodeBtn" title="Copy code"><i
                                    class="fas fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="code-content" id="codeContent">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-folder-open"></i></div>
                            <div>Select a file to preview</div>
                        </div>
                    </div>
                </div>

                <!-- Output Panel -->
                <div class="output-panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <i class="fas fa-terminal"></i> Output
                        </div>
                        <div class="panel-actions">
                            <button class="icon-btn" id="copyOutputBtn" title="Copy output"><i
                                    class="fas fa-copy"></i></button>
                            <button class="icon-btn" id="clearOutputBtn" title="Clear output"><i
                                    class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="loading-spinner" id="loading">
                        <div class="spinner"></div>
                        <div>Compiling & Running...</div>
                    </div>
                    <div class="output-content" id="output"></div>
                </div>
            </div>

            <!-- Run Mode Selector -->
            <div class="run-controls mode-panel">
                <span class="mode-label">Run mode:</span>
                <label class="radio-option">
                    <input type="radio" name="runMode" value="judge" checked>
                    Judge style <span class="mode-hint">(paste all input first, one-shot result)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="runMode" value="interactive">
                    Interactive terminal <span class="mode-hint">(live prompts, type as it runs)</span>
                </label>
            </div>

            <!-- Stdin Input (judge mode only) -->
            <div class="run-controls stdin-panel" id="stdinPanel">
                <label for="stdinInput">Program input (stdin) — one value per line, in the order your program reads them:</label>
                <textarea id="stdinInput" rows="3" placeholder="e.g.&#10;5&#10;10 20 30 40 50"></textarea>
            </div>

            <!-- Interactive input (interactive mode only) -->
            <div class="run-controls stdin-panel" id="interactivePanel" style="display:none;">
                <label for="terminalInput">Type input and press Enter to send it to the running program:</label>
                <input type="text" id="terminalInput" placeholder="Type here while the program is running..." disabled>
            </div>

            <!-- Controls -->
            <div class="run-controls">
                <button class="run-btn" id="runBtn" disabled>
                    <i class="fas fa-play"></i> Run Code
                </button>
                <div class="status-info">
                    <div class="status-item">
                        <div class="status-indicator" id="statusIndicator"></div>
                        <span id="statusText">Ready</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
